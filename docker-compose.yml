services:
  scripts:
    build: ./scripts
    container_name: enervigil-init-scripts
    environment:
      - APP_DATA_PATH=/var/lib/enervigil-backend
      - HOSTNAME=${HOSTNAME:-}
      - MQTT_ENABLE_PLAIN=${MQTT_ENABLE_PLAIN:-false}
      - MQTT_ENABLE_TLS=${MQTT_ENABLE_TLS:-true}
      - MQTT_ALLOW_ANONYMOUS=${MQTT_ALLOW_ANONYMOUS:-true}
      - MQTT_RESET_PASSWORD=${MQTT_RESET_PASSWORD:-false}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    volumes:
      - ./cert:/cert
      - ./conf:/conf
      - ./data/app:/var/lib/enervigil-backend
  influxdb:
    image: influxdb:1.8
    container_name: enervigil-timedb
    command: influxd -config /etc/influxdb/influxdb.conf
    volumes:
      - ./data/influxdb:/var/lib/influxdb
      - ./conf/influxdb:/etc/influxdb
      - ./logs/influxdb:/var/log/influxdb
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: enervigil-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./conf/nginx:/etc/nginx:ro
      - ./logs/nginx:/var/log/nginx
      - ./cert:/cert:ro
    depends_on:
      - scripts
      - ui
      - backend
    restart: unless-stopped
  ui:
    build: ./ui
    container_name: enervigil-ui
    environment:
      # Internal SvelteKit Server
      - HOST=0.0.0.0
      - PORT=8080
    restart: unless-stopped
  backend:
    build: ./app
    container_name: enervigil-backend
    environment:
      # Internal HTTP server
      - HTTP_HOSTNAME=0.0.0.0
      - HTTP_PORT=8000
      # InfluxDB connection
      - TIMEDB_HOSTNAME=enervigil-timedb
      - TIMEDB_PORT=8086
      - TIMEDB_USERNAME=root
      - TIMEDB_PASSWORD=root
      # Paths
      - DB_PATH=/var/lib/sqlite
      - APP_DATA_PATH=/var/lib/enervigil-backend
    volumes:
      - ./data/sqlite:/var/lib/sqlite
      - ./data/app:/var/lib/enervigil-backend
      - ./cert:/cert:ro
    depends_on:
      - influxdb
      - scripts
    restart: unless-stopped
  mosquitto:
    image: eclipse-mosquitto:2
    networks:
      default:
        aliases:
          - ${HOSTNAME}
          - mosquitto
          - localhost
    container_name: enervigil-mosquitto
    environment:
      - MQTT_ALLOW_ANONYMOUS=${MQTT_ALLOW_ANONYMOUS:-true}
      - MQTT_RESET_PASSWORD=${MQTT_RESET_PASSWORD:-false}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTTS_PORT:-8883}:8883"
    volumes:
      - ./conf/mosquitto:/mosquitto/config
      - ./data/mosquitto:/mosquitto/data
      - ./logs/mosquitto:/mosquitto/log
      - ./cert:/cert:ro
    entrypoint: [ "/mosquitto/config/entrypoint.sh" ]
    depends_on:
      - scripts
    restart: unless-stopped
networks:
  default:
    driver: bridge
